<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Razorpay Payment</title>
    <style>
        body { font-family: Arial; padding: 50px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #3399cc; color: white; border: none; border-radius: 5px;}
        input { padding: 10px; font-size: 16px; width: 300px; margin-bottom: 10px; display: block; margin: 10px auto; }
        #result { margin-top: 20px; background: #eee; padding: 20px; text-align: left; }
    </style>
</head>
<body>

    <h2>Razorpay Test Checkout</h2>
    <p>Paste the orderId and keyId you got from Postman below:</p>

    <input type="text" id="keyId" placeholder="Razorpay Key ID (rzp_test_...)">
    <input type="text" id="orderId" placeholder="Order ID (order_...)">
    
    <button id="rzp-button1">Pay ₹5000</button>

    <pre id="result">Payment details will appear here...</pre>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        document.getElementById('rzp-button1').onclick = function(e){
            var options = {
                "key": document.getElementById('keyId').value,
                "amount": "500000", // 5000 INR in paise
                "currency": "INR",
                "name": "Sports Academy",
                "description": "Enrollment Fee",
                "order_id": document.getElementById('orderId').value,
                "handler": function (response){
                    // This is what Razorpay gives us when a payment succeeds
                    document.getElementById('result').innerText = JSON.stringify(response, null, 2) + 
                    "\n\n👆 Now copy these 3 fields and put them in Postman -> POST /api/payment/verify to finalize enrollment!";
                },
                "theme": { "color": "#3399cc" }
            };
            var rzp1 = new Razorpay(options);
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
